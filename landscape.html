<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="samir.css">
    <style>
        body{
			background-color: black;
			color: white;
		}
		.container{
			width: 100%;
			max-width:1080px;
		}
		.btn{
			padding:10px;
			margin:5px;
			width: fit-content;
			height:fit-content;
			font-size: 16px;
		}
        .ctrl{
            padding:15px;
            width: 100%;
			height:100%;
        }
    </style>
</head>
<body>
    <div id="main" class="flex full row center">
        <div id="controls-left" class="flex column center one">
            <div class="flex one center full-width">
                <button class="ctrl" onclick="game.input('jump')">jump</button>
            </div>
            <div class="flex one center row full-width">
                <button class="ctrl" onclick="game.input('back dash')">b dash</button>
                <button class="ctrl" onclick="game.input('dash')">dash</button>
            </div>
            <div class="flex one center full-width">
                <button class="ctrl" onclick="game.match.actors[1].set_state('block')">block</button>
            </div>
        </div>
        <div id="screen" class="flex outline two relative">
            <div class="flex full absolute priority-1 center" style="background-color: rgba(0,0,0,0.8);" id="start-screen">
                <button id="start" class="btn">start</button>
            </div>
            <div class="flex full absolute priority-1 center hidden" style="background-color: rgba(0,0,0,0.2);" id="pause-menu">
                <button id="resume" class="btn">resume</button>
                <button id="restart" class="btn">restart</button>
                <button id="toggle-ai" class="btn">toggle ai</button>
            </div>
            <canvas class="flex one" id="game-canvas"></canvas>
        </div>
        <div id="controls-right" class="flex column center one">
            <div class="flex one center full-width">
                <button class="ctrl" onclick="game.match.actors[1].handle_input('ultimate', game)">ultimate</button>
            </div>
            <div class="flex one center full-width row">
                <button class="ctrl" onclick="game.match.actors[1].set_state('special 1')">special 1</button>
                <button class="ctrl" onclick="game.match.actors[1].set_state('special 2')">special 2</button>
                <button class="ctrl" onclick="game.match.actors[1].set_state('special 3')">special 3</button>
            </div>
            <div class="flex one center full-width">
                <button class="ctrl" onclick="game.match.actors[1].set_state('attack')">attack</button>
            </div>
            
            
            
        </div>
        
    </div>
    <button id="pause" class="btn">pause</button>

    <script src="battle_engine.js"></script>
    <script src="physics.js"></script>
    <script src="player.js"></script>
    <script src="match.js"></script>
    <script src="main.js"></script>
</body>
</html>
